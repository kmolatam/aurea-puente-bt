plugins {
    id 'com.android.application'
}

android {
    namespace 'com.kmo.aureaprintbridge'
    compileSdk 35

    defaultConfig {
        applicationId 'com.kmo.aureaprintbridge'
        minSdk 23
        targetSdk 35
        versionCode 4
        versionName '0.2.2-rescate-stable'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
